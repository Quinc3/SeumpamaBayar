<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeumpamaBayar - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #006b2c, #008a38);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .login-card {
            background: #fff;
            border-radius: 16px;
            padding: 2.5rem 2rem;
            width: 380px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<div class="login-card text-center">
    <h3 class="fw-bold mb-1">🌱 SeumpamaBayar</h3>
    <small class="text-muted">Masuk untuk melanjutkan</small>
    <hr>
    <div class="mb-3 text-start">
        <label class="form-label small fw-semibold">Nama</label>
        <input type="text" class="form-control" id="inputNama" placeholder="Masukkan nama">
    </div>
    <div class="mb-3 text-start">
        <label class="form-label small fw-semibold">NIM</label>
        <input type="text" class="form-control" id="inputNIM" placeholder="Masukkan NIM">
    </div>
    <button class="btn btn-primary w-100 py-2 fw-semibold" onclick="login()">
        <i class="bi bi-box-arrow-in-right me-2"></i>Masuk
    </button>
    <small class="text-muted d-block mt-3">* Login palsu, tidak perlu password</small>
</div>

<script>
    function login() {
        const nama = document.getElementById('inputNama').value.trim() || 'Budi Darmawan';
        const nim = document.getElementById('inputNIM').value.trim() || '221011450661';
        
        // Simpan user ke localStorage
        localStorage.setItem('user', JSON.stringify({ nama, nim }));
        
        // Redirect ke dashboard
        window.location.href = 'index.html';
    }
</script>

</body>
</html>
